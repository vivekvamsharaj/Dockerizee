<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dockerized App Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Application Control Center</h1>
            <p>Containerized Environment Status</p>
        </header>

        <main>
            <div class="card" id="status-card">
                <h2>System Status</h2>
                <div class="status-indicator">
                    <span class="badge badge-loading" id="status-badge">Checking...</span>
                </div>
                <p id="status-text">Connecting to container environment...</p>
            </div>

            <div class="card">
                <h2>Environment Variables</h2>
                <table class="env-table">
                    <thead>
                        <tr>
                            <th>Variable</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><code>PORT</code></td>
                            <td><span class="fallback-val">8080</span></td>
                        </tr>
                        <tr>
                            <td><code>NODE_ENV</code></td>
                            <td><span class="fallback-val" id="env-mode">production</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            <button id="refresh-btn" class="btn">Refresh Environment Data</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
